name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pages 배포에 필요한 최소 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 실행되지 않도록 제한
# cancel-in-progress: 진행 중인 배포가 있으면 취소하고 최신 것만 실행
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --dangerously-allow-all-builds

      - run: pnpm build

      # GitHub Pages는 정적 파일 서버라 존재하지 않는 경로 접근 시 404.html을 반환함
      # index.html을 404.html로 복사해두면 SPA 라우팅이 정상 동작
      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # 빌드 결과물을 GitHub Pages artifact로 업로드
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
